services:
  mysql:
    image: mysql:8.0.45
    container_name: xgame-mysql
    platform: linux/x86_64
    restart: always

    # 生产级优化命令参数
    command: >
      --innodb_file_per_table=1
      --general_log=0
      --lower_case_table_names=1
      --log_bin_trust_function_creators=ON
      --character_set_server=utf8mb4
      --collation_server=utf8mb4_general_ci
      --event_scheduler=ON
      --innodb_buffer_pool_size=1G
      --max_connections=4096
      --group_concat_max_len=1844674407370954752
      --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION

    environment:
      MYSQL_ROOT_PASSWORD: areanEm2354PzeMT
      MYSQL_ROOT_HOST: '%'                  # 允许远程连接
      # 新版本推荐使用 caching_sha2_password
      MYSQL_ROOT_DEFAULT_AUTH: caching_sha2_password

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "3306:3306"

    volumes:
      - ./xgame-mysql:/var/lib/mysql   # 持久化数据库文件
      - ./xgame-mysql-init:/docker-entrypoint-initdb.d  # 可放初始化SQL脚本

    networks:
      - middleware
  redis:
    image: redis:7.4
    container_name: xgame-redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    platform: linux/x86_64
    restart: always
    volumes:
      - ./xgame-redis:/data
    ports:
      - '6379:6379'
    command: redis-server --requirepass areanEm2354PzeRs
    networks:
      - middleware 
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: xgame-nacos
    restart: unless-stopped

    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname

      # 开启鉴权
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security

      # 建议换成你自己的 Base64 Secret，不要生产用默认示例值
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789

      # 降低内存占用，适合本地开发
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m

    volumes:
      - ./xgame-nacos/logs:/home/nacos/logs
      - ./xgame-nacos/data:/home/nacos/data

    ports:
      # 控制台 / HTTP API
      - "127.0.0.1:8848:8848"

      # Nacos 2.x 客户端 gRPC 通信端口，官方 v2.x Docker 示例也暴露了 9848
      - "127.0.0.1:9848:9848"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
  consul:
    image: hashicorp/consul:1.17.2
    container_name: server-consul
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    platform: linux/x86_64
    restart: always
    environment:
      - CONSUL_LIMITS_HTTP_MAX_CONNS_PER_CLIENT=8192
      - CONSUL_LIMITS_RPC_RATE=128
      - CONSUL_LIMITS_RPC_MAX_BURST=256
    volumes:
      - ./server-consul:/data
    ports:
      - '8300:8300'
      - '8301:8301'
      - '8301:8301/udp'
      - '8500:8500'
      - '18600:8600'
      - '18600:8600/udp'
  nats:
    image: nats:latest
    container_name: server-nats
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    volumes:
      - ./server-nats/jetstream:/data # JetStream 数据持久化
    ports:
      - '4222:4222' # 客户端端口
      - '8222:8222' # 监控端口（可选）
    # 移除 6222 端口（除非需要集群）
    healthcheck:
      test: [ "CMD", "nats", "server", "info" ]
      interval: 20s
networks:
  middleware:
    driver: bridge
